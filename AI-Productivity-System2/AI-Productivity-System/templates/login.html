<!DOCTYPE html>
<html>
<head>

<title>AI Productivity System</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body class="login-bg">

<div class="login-box">

<h2 class="text-center mb-4">
<i class="fa-solid fa-brain"></i> AI Productivity
</h2>

<form method="POST" action="/login">

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa-solid fa-user"></i>
</span>

<input name="username" class="form-control" placeholder="Username" required>

</div>

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa-solid fa-lock"></i>
</span>

<input name="password" type="password" class="form-control" placeholder="Password" required>

</div>

<button class="btn btn-primary w-100">
Login
</button>

</form>

<hr>

<form method="POST" action="/register">

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa-solid fa-user-plus"></i>
</span>

<input name="username" class="form-control" placeholder="New Username" required>

</div>

<div class="input-group mb-3">

<span class="input-group-text">
<i class="fa-solid fa-key"></i>
</span>

<input name="password" type="password" class="form-control" placeholder="New Password" required>

</div>

<button class="btn btn-success w-100">
Register
</button>

</form>

</div>

</body>
</html>
